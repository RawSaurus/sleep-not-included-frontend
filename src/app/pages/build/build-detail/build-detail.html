@if (isLoading()) {
  <div class="container">
    <p class="loading">Loading build...</p>
  </div>
}

@if (error()) {
  <div class="container">
    <p class="error">{{ error() }}</p>
  </div>
}

@if (build(); as b) {
  <div class="container build-detail">

    <h1>{{ b.name }}</h1>

    <div class="build-meta">
      ❤️ {{ b.likes ?? 0 }} Likes
    </div>

    <p class="description">
      {{ b.description ?? 'No description provided.' }}
    </p>

    <div class="build-footer">
      <span class="creator">By user #{{ b.creatorId }}</span>
    </div>

  </div>
}
