<div class="card build-card">

  @if (build().thumbnailUrl) {
    <img [src]="build().thumbnailUrl" alt="Build thumbnail" />
  } @else {
    <div class="no-thumbnail">No image</div>
  }

  <div class="build-content">
    <h3 class="build-title">
      <a [routerLink]="['/build', build().id]">
        {{ build().name }}
      </a>
    </h3>

    <div class="build-meta">
      ❤️ {{ build().likes }} Likes
    </div>

    <p class="build-desc">
      {{ build().description }}
    </p>

    <div class="tags">
      @for (tag of build().tags; track tag.id) {
        <span class="tag">{{ tag.name }}</span>
      }
    </div>

    <div class="build-footer">
      <span class="creator">By user {{ build().creatorName }}</span>
    </div>

<!--    <div class="tags">-->
<!--      @for (tag of build().tags; track tag) {-->
<!--        <span class="tag">{{ tag }}</span>-->
<!--      }-->
<!--    </div>-->
  </div>

</div>
